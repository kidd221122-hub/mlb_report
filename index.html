## 一、基本介紹

**HOBIE**（**H**olistic **O**utcomes **B**aseball **I**nsight **E**ngine）是由 **Brian Burkhard** 開發的 MLB 賽季勝場預測模型。

- **開發者背景**：Brian Burkhard，博士學位，專業領域為優化模型與心理屬性評估
- **首次發表**：2022 年 4 月 6 日 Medium 文章
- **命名由來**：致敬 Hobie Landrith——1961 年紐約大都會隊擴編選秀第一順位

## 二、核心設計理念

> **識別上一個賽季中不可重複事件（即「運氣」）對勝場總數的影響程度，然後根據名單變動確定這些因素將如何改變下一賽季的基準。**

### 關鍵思路：

1. **去除「群聚運氣」（Cluster Luck）**：調整 OBP/SLG/ISO 等數據，回歸到可重複的真實表現
2. **考慮名單變動**：老化曲線、交易、自由球員簽訂
3. **整體性方法（Holistic）**：綜合考量攻擊、投球、牛棚、防守等多維度

## 三、模型績效

| 指標 | HOBIE | FanGraphs | PECOTA |
|------|-------|-----------|--------|
| **MAE** | **最低** | 低 | 中 |
| **RMSE** | **最低** | 低 | 中 |
| **投注命中率** | **68%** | ~50% | ~47% |
| **2024 戰績** | **14–3** | - | - |

## 四、結論

HOBIE 的核心競爭力在於徹底去除運氣成分，聚焦可重複的真實表現，並前瞻性地考量名單變動。
`

## 一、投球指標與勝率相關性排名

| 排名 | 指標 | 與勝率相關性 |
|------|------|-------------|
| 1 | **Run Differential** | ~0.90 |
| 2 | **ERA** | -0.88 |
| 3 | **Opponent OPS** | -0.86 |
| 4 | **LOB%** | ~0.70+ |
| 5 | **Pitching WAR** | ~0.65+ |

## 二、賽季勝場預測公式

### Pythagorean Expectation

$$
\\text{勝率} = \\frac{{RS^2}}{{RS^2 + RA^2}}
$$

現代改良版（指數 1.83）：

$$
\\text{勝率} = \\frac{{RS^{1.83}}}{{RS^{1.83} + RA^{1.83}}}
$$

### 預期勝場計算

$$
\\text{預期勝場} = 162 \\times \\text{勝率}
$$

## 三、單場比分預測公式

### Lambda 計算

$$
\\lambda = \\text{基礎得分} \\times \\text{攻擊調整} \\times \\text{投手調整} \\times \\text{場地因子} \\times \\text{天氣因子}
$$

### Poisson 分佈

$$
P(X = k) = \\frac{{e^{-\\lambda} \\lambda^k}}{{k!}}
$$

## 四、Python 實作範例

\`\`\`python
from scipy.stats import poisson

def predict_game(lambda_home, lambda_away):
    win_prob_home = 0
    for i in range(15):
        for j in range(i):
            win_prob_home += poisson.pmf(i, lambda_home) * poisson.pmf(j, lambda_away)
    return win_prob_home

## 一、MLB 投手的六大角色分類

| 角色 | 定義 | 典型局數 |
|------|------|---------|
| **先發投手 (SP)** | 每場開局投球 | 5–7 局 |
| **開路者 (Opener)** | 先發 1–2 局後換人 | 1–2 局 |
| **長中繼 (Long Reliever)** | 先發早退時補位 | 3–5 局 |
| **中繼投手** | 中段局數接手 | 1–2 局 |
| **布局投手 (Setup Man)** | 第九局前保護領先 | 1 局 |
| **終結者 (Closer)** | 最後一局守住勝利 | 1 局 |

## 二、為什麼不能直接用 ERA 比較？

Bill James 在 1977 年的 SABR 研究證明：**救援角色的 ERA 天生比先發低 0.25–0.50 分**。

### 三大原因：

1. **已有人出局** — 救援投手通常帶著 1–2 出局上場
2. **只面對打者一次** — 先發投手每場面對打序 2–3 次
3. **全力投球** — 救援投手知道只投 1 局

## 三、分離式評估方法

$$
\\text{綜合 SIERA} = w_{SP} \\times SIERA_{SP} + w_{RP} \\times SIERA_{RP}
$$

其中：
- $w_{SP}$ = 先發局數 / 總局數
- $w_{RP}$ = 救援局數 / 總局數

## 四、評估步驟

1. **確認角色分佈** — 先發/救援場次比例
2. **分別計算技能指標** — SIERA/xFIP/K-BB%
3. **檢查 Statcast 品質** — Stuff+/SwStr%
4. **計算加權綜合評分**
5. **評估角色適應力**

            const categoryList = document.getElementById('categoryList');

            Object.keys(reports).forEach((category, index) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';

                header.onclick = () => toggleCategory(header);

                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'category-items' + (index === 0 ? ' active' : '');

                reports[category].forEach((report, reportIndex) => {
                    const item = document.createElement('div');
                    item.className = 'category-item' + (index === 0 && reportIndex === 0 ? ' active' : '');
                    item.textContent = report.title;
                    item.dataset.category = category;
                    item.dataset.reportId = report.id;
                    item.onclick = () => loadReport(category, report.id, item);
                    itemsDiv.appendChild(item);

                categoryDiv.appendChild(header);
                categoryDiv.appendChild(itemsDiv);
                categoryList.appendChild(categoryDiv);

        // ==================== Toggle Category ====================
        function toggleCategory(header) {
            const items = header.nextElementSibling;
            const isActive = header.classList.contains('active');

            header.classList.toggle('active');
            items.classList.toggle('active');
        }

        // ==================== Load Report ====================
        function loadReport(category, reportId, element) {
            // Update active state
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('active');
            });
            if (element) {
                element.classList.add('active');
            }

            // Find report data
            const report = reports[category].find(r => r.id === reportId);
            if (!report) return;

            currentReport = { category, ...report };

            // Render report
            const container = document.getElementById('reportContainer');
            container.innerHTML = \`
                <div class="report-header">

                    <h1 class="report-title">\${report.title}</h1>

        // ==================== Search Functionality ====================
        function buildSearchIndex() {
            searchIndex = [];
            Object.keys(reports).forEach(category => {
                reports[category].forEach(report => {
                    searchIndex.push({
                        category,
                        id: report.id,
                        title: report.title,
                        date: report.date,
                        content: report.content.replace(/[#*`>\-\[\]]/g, '').substring(0, 200),
                        tags: report.tags
                    });
                });
            });
        }

        function handleSearch(query) {
            const resultsDiv = document.getElementById('searchResults');

            if (!query || query.length < 2) {
                resultsDiv.classList.remove('active');
                return;
            }

            const results = searchIndex.filter(item =>
                item.title.toLowerCase().includes(query.toLowerCase()) ||
                item.content.toLowerCase().includes(query.toLowerCase()) ||
                item.tags.some(tag => tag.toLowerCase().includes(query.toLowerCase()))
            );

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item"><div class="search-result-title">無搜尋結果</div></div>';
            } else {
                resultsDiv.innerHTML = results.slice(0, 10).map(item => \`
                    <div class="search-result-item" onclick="loadReport('\${item.category}', '\${item.id}')">
                        <div class="search-result-title">\${highlightText(item.title, query)}</div>
                        <div class="search-result-preview">\${highlightText(item.content.substring(0, 100), query)}</div>
                    </div>
                \`).join('');
            }

            resultsDiv.classList.add('active');
        }

        function highlightText(text, query) {
            const regex = new RegExp(\`(\${query})\`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        // Close search results when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                document.getElementById('searchResults').classList.remove('active');
            }
        });

        // ==================== Theme Toggle ====================
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        }
